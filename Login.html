<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — EARCO</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dots"><span></span><span></span><span></span><span></span></div>
</div>

<div class="login-wrapper">

  <div class="brand">
    <h1>EARCO<span>.</span></h1>
    <p>Better Sound Every Day</p>
  </div>

  <div class="login-box">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', event)">Login</button>
      <button class="tab" onclick="switchTab('signup', event)">Sign Up</button>
    </div>

    <!-- ERROR / SUCCESS -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter your username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter your password">
      </div>
      <button class="btn-login" onclick="login()">LOGIN</button>

      <div class="guest-notice">
        🔒 <strong>Account required to purchase.</strong><br>
        Sign up to add items to your cart and checkout.
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Enter your full name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUser" placeholder="Choose a username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPass" placeholder="Choose a password">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" placeholder="Repeat your password">
      </div>
      <button class="btn-login" onclick="signup()">CREATE ACCOUNT</button>
    </div>

  </div>
</div>

<script src="loader.js"></script>

<script>
function switchTab(tab, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (e) e.target.classList.add('active');

  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';

  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}

function hideMessages() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}

function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();

  if (!username || !password) {
    showError('⚠️ Please fill in all fields.');
    return;
  }

  const users = JSON.parse(localStorage.getItem('earco_users')) || [];
  const match = users.find(u => u.username === username && u.password === password);

  if (match) {
    localStorage.setItem('loggedIn', 'true');
    localStorage.setItem('username', username);

    window.location.href = './index.html';
  } else {
    showError('❌ Incorrect username or password.');
    document.getElementById('loginPass').value = '';
  }
}

function signup() {
  const name = document.getElementById('signupName').value.trim();
  const username = document.getElementById('signupUser').value.trim();
  const password = document.getElementById('signupPass').value.trim();
  const confirm = document.getElementById('signupConfirm').value.trim();

  if (!name || !username || !password || !confirm) {
    showError('⚠️ Please fill in all fields.');
    return;
  }

  if (password.length < 6) {
    showError('⚠️ Password must be at least 6 characters.');
    return;
  }

  if (password !== confirm) {
    showError('❌ Passwords do not match.');
    return;
  }

  const users = JSON.parse(localStorage.getItem('earco_users')) || [];

  if (users.find(u => u.username === username)) {
    showError('❌ Username already taken.');
    return;
  }

  users.push({ name, username, password });
  localStorage.setItem('earco_users', JSON.stringify(users));

  localStorage.setItem('loggedIn', 'true');
  localStorage.setItem('username', username);

  showSuccess('✅ Account created! Redirecting...');

  setTimeout(() => {
    window.location.href = './index.html';
  }, 1000);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;

  const loginVisible = document.getElementById('loginForm').style.display !== 'none';
  loginVisible ? login() : signup();
});

// Hide messages when typing
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', hideMessages);
});
</script>

</body>
</html>
