<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact EARCO</title>
<link rel="stylesheet" href="contact.css">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
  .cart-link { position: relative; }
  .cart-badge { position: absolute; top: -8px; right: -8px; background: #e74c3c; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dots"><span></span><span></span><span></span><span></span></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <h2>EARCO.</h2>
    <p>Better Sound Every Day</p>
  </div>
  <nav>
    <ul id="navMenu">
      <li><a href="/">HOME</a></li>
      <li><a href="/about">ABOUT US</a></li>
      <li><a href="/products">ALL PRODUCTS</a></li>
      <li class="cart-link">
        <a href="javascript:void(0)" onclick="goToCart()">
          <i class="fa-solid fa-cart-shopping"></i>
        </a>
        <span class="cart-badge" id="cartBadge" style="display:none"></span>
      </li>
      <li class="dropdown" id="accountDropdown">
        <button class="account-btn" id="accountBtn" onclick="toggleDropdown(event)">
          ACCOUNT <i class="fa-solid fa-caret-down"></i>
        </button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="/login">Login</a>
          <a href="/login">Sign Up</a>
        </div>
      </li>
    </ul>
  </nav>
</header>

<!-- CONTACT SECTION -->
<section class="contact">
  <h1>CONTACT</h1>

  <form action="https://formspree.io/f/mreyedzv" method="POST">
    <input type="hidden" name="_subject" value="New EARCO Contact Message">
    <div class="row">
      <div class="input-group">
        <label>First Name</label>
        <input type="text" name="first_name" placeholder="Enter your first name" required>
      </div>
      <div class="input-group">
        <label>Last Name</label>
        <input type="text" name="last_name" placeholder="Enter your last name" required>
      </div>
    </div>
    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>
    <label>Subject</label>
    <input type="text" name="subject" placeholder="Enter subject">
    <label>Message</label>
    <textarea name="message" rows="6" placeholder="Write your message here" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <!-- CONTACT INFO -->
  <div class="contact-info">
    <h3>Get In Touch</h3>
    <p>Have questions about our products or need support? Fill in the form above or reach out directly.</p>

    <div class="reveal-row">
      <button class="reveal-btn" onclick="revealContact('phone', this)">
        <i class="fa-solid fa-phone"></i> Show Phone Number
      </button>
      <span class="contact-detail" id="phone" style="display:none"></span>
    </div>

    <div class="reveal-row">
      <button class="reveal-btn" onclick="revealContact('emailDetail', this)">
        <i class="fa-solid fa-envelope"></i> Show Email Address
      </button>
      <span class="contact-detail" id="emailDetail" style="display:none"></span>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div id="footerLinks">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/products">Products</a>
    <span id="footerAuth"></span>
  </div>
  <p>© 2026 EARCO. All Rights Reserved</p>
</footer>

<script src="loader.js"></script>
<script>
  const loggedIn = localStorage.getItem("loggedIn") === "true";
  const username = localStorage.getItem("username");

  /* Cart badge */
  function updateBadge() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const totalQty = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
    const badge = document.getElementById("cartBadge");
    if (badge) {
      badge.textContent = totalQty;
      badge.style.display = totalQty > 0 ? "flex" : "none";
    }
  }
  updateBadge();

  /* Update header if logged in */
  if (loggedIn && username) {
    document.getElementById('accountBtn').innerHTML =
      `<i class="fa-solid fa-user"></i> ${username} <i class="fa-solid fa-caret-down"></i>`;
    document.getElementById('dropdownMenu').innerHTML =
      `<a href="javascript:void(0)" onclick="goToCart()">My Cart</a>
       <a href="/payment">Pay Now</a>
       <a href="javascript:void(0)" onclick="logout()">Logout</a>`;
  }

  /* Update footer */
  const footerAuth = document.getElementById('footerAuth');
  if (loggedIn) {
    footerAuth.innerHTML = `<a href="javascript:void(0)" onclick="logout()">Logout</a>`;
  } else {
    footerAuth.innerHTML = `<a href="/login">Login</a>`;
  }

  /* Cart */
  function goToCart() {
    window.location.href = loggedIn ? "/cart" : "/login";
  }

  /* Logout */
  function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");
    localStorage.removeItem("cart");
    window.location.href = "/";
  }

  /* Dropdown */
  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('dropdownMenu').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('dropdownMenu').classList.remove('open');
  });

  /* Reveal contact details */
  const details = {
    phone: ['+27', '67', '670454'].join(' '),
    emailDetail: ['nasiphisiphesihle', 'ndzumo', '@gmail.com'].join('')
  };

  function revealContact(type, btn) {
    const el = document.getElementById(type);
    el.textContent = details[type];
    el.style.display = 'inline';
    btn.style.display = 'none';
  }
</script>
</body>
</html>
