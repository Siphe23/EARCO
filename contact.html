<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact EARCO</title>
<link rel="stylesheet" href="contact.css">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dots"><span></span><span></span><span></span><span></span></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <h2>EARCO.</h2>
    <p>Better Sound Every Day</p>
  </div>
  <nav>
    <ul id="navMenu">
      <li><a href="index.html">HOME</a></li>
      <li><a href="about.html">ABOUT US</a></li>
      <li class="cart-link"><a href="javascript:void(0)" onclick="goToCart()"><i class="fa-solid fa-cart-shopping"></i></a></li>
      <li class="dropdown" id="accountDropdown">
        <button class="account-btn" onclick="toggleDropdown(event)">ACCOUNT <i class="fa-solid fa-caret-down"></i></button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="login.html">Login</a>
          <a href="signup.html">Sign Up</a>
        </div>
      </li>
    </ul>
  </nav>
</header>

<!-- CONTACT SECTION -->
<section class="contact">
  <h1>CONTACT</h1>

  <form action="https://formspree.io/f/mreyedzv" method="POST">
    <input type="hidden" name="_subject" value="New EARCO Contact Message">
    <div class="row">
      <div class="input-group">
        <label>First Name</label>
        <input type="text" name="first_name" placeholder="Enter your first name" required>
      </div>
      <div class="input-group">
        <label>Last Name</label>
        <input type="text" name="last_name" placeholder="Enter your last name" required>
      </div>
    </div>
    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>
    <label>Subject</label>
    <input type="text" name="subject" placeholder="Enter subject">
    <label>Message</label>
    <textarea name="message" rows="6" placeholder="Write your message here" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <!-- CONTACT INFO — details hidden until revealed -->
  <div class="contact-info">
    <h3>Get In Touch</h3>
    <p>Have questions about our products or need support? Fill in the form above or reach out directly.</p>

    <div class="reveal-row">
      <button class="reveal-btn" onclick="revealContact('phone', this)">
        <i class="fa-solid fa-phone"></i> Show Phone Number
      </button>
      <span class="contact-detail" id="phone" style="display:none"></span>
    </div>

    <div class="reveal-row">
      <button class="reveal-btn" onclick="revealContact('email', this)">
        <i class="fa-solid fa-envelope"></i> Show Email Address
      </button>
      <span class="contact-detail" id="email" style="display:none"></span>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div id="footerLinks">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
  </div>
  <p>© 2026 EARCO. All Rights Reserved</p>
</footer>

<script src="loader.js"></script>
<script>
  /* Dropdown */
  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('dropdownMenu').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('dropdownMenu').classList.remove('open');
  });

  /* Reveal contact details only on click — not visible to bots or scrapers */
  const details = {
    phone: ['+27', '67', '670454'].join(' '),
    email: ['nasiphisiphesihle', 'ndzumo', '@gmail.com'].join('')
  };

  function revealContact(type, btn) {
    const el = document.getElementById(type);
    el.textContent = details[type];
    el.style.display = 'inline';
    btn.style.display = 'none';
  }
</script>
</body>
</html>
