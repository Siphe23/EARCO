<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EARCO Cart</title>
<link rel="stylesheet" href="cart.css">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

<script>
  if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "/login";
  }
</script>

<!-- LOADER -->
<div id="loader">
  <div class="loader-dots"><span></span><span></span><span></span><span></span></div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <h2>EARCO.</h2>
    <p>Better Sound Every Day</p>
  </div>
  <nav>
    <ul id="navMenu">
      <li><a href="/">HOME</a></li>
      <li><a href="/about">ABOUT US</a></li>
      <li><a href="/products">ALL PRODUCTS</a></li>
      <li class="cart-link">
        <a href="/cart"><i class="fa-solid fa-cart-shopping"></i></a>
        <span class="cart-badge" id="cartBadge" style="display:none"></span>
      </li>
      <li class="dropdown" id="accountDropdown">
        <button class="account-btn" id="accountBtn" onclick="toggleDropdown(event)">
          ACCOUNT <i class="fa-solid fa-caret-down"></i>
        </button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="/login">Login</a>
          <a href="/login">Sign Up</a>
        </div>
      </li>
    </ul>
  </nav>
</header>

<!-- CART PAGE -->
<section class="cart-page">
  <div class="cart-box">
    <div class="cart-topbar">
      <h2><i class="fa-solid fa-cart-shopping"></i> CART <span id="itemCount">(0 items)</span></h2>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="clear-cart-btn" id="clearCartBtn" onclick="clearCart()" style="display:none">
          <i class="fa-solid fa-trash"></i> Clear Cart
        </button>
        <a href="/products" class="continue-btn"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
      </div>
    </div>

    <div class="cart-divider"></div>

    <div class="empty-cart" id="emptyCart">
      <i class="fa-solid fa-box-open"></i>
      <p>Your cart is empty.</p>
      <a href="/products" class="shop-now-btn">Start Shopping</a>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-divider"></div>
      <div class="cart-total-row">
        <span>Total</span>
        <span id="cartTotal" class="total-amount">R0.00</span>
      </div>
      <div class="cart-actions">
        <a href="/products" class="btn-secondary"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
        <button class="btn-checkout" id="checkoutBtn">Checkout <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div id="footerLinks">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/products">Products</a>
    <a href="javascript:void(0)" onclick="logout()">Logout</a>
  </div>
  <p>© 2026 EARCO. All Rights Reserved</p>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="loader.js"></script>
<script>
  const username = localStorage.getItem("username");

  if (username) {
    document.getElementById('accountBtn').innerHTML =
      `<i class="fa-solid fa-user"></i> ${username} <i class="fa-solid fa-caret-down"></i>`;
    document.getElementById('dropdownMenu').innerHTML =
      `<a href="/cart">My Cart</a>
       <a href="/payment">Pay Now</a>
       <a href="javascript:void(0)" onclick="logout()">Logout</a>`;
  }

  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('dropdownMenu').classList.toggle('open');
  }
  document.addEventListener('click', function () {
    document.getElementById('dropdownMenu').classList.remove('open');
  });

  function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");
    localStorage.removeItem("cart");
    window.location.href = "/";
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function updateBadge(cart) {
    const badge = document.getElementById("cartBadge");
    const totalQty = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
    if (totalQty > 0) { badge.textContent = totalQty; badge.style.display = "flex"; }
    else { badge.style.display = "none"; }
  }

  function renderCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartItemsDiv = document.getElementById("cartItems");
    const emptyCart = document.getElementById("emptyCart");
    const cartFooter = document.getElementById("cartFooter");
    const cartTotal = document.getElementById("cartTotal");
    const itemCount = document.getElementById("itemCount");
    const clearBtn = document.getElementById("clearCartBtn");

    cartItemsDiv.innerHTML = "";
    let total = 0;
    let totalItems = 0;

    updateBadge(cart);
    cart.forEach(item => { if (!item.qty) item.qty = 1; totalItems += item.qty; });
    itemCount.textContent = `(${totalItems} item${totalItems !== 1 ? 's' : ''})`;

    if (cart.length === 0) {
      emptyCart.style.display = "flex";
      cartFooter.style.display = "none";
      clearBtn.style.display = "none";
    } else {
      emptyCart.style.display = "none";
      cartFooter.style.display = "block";
      clearBtn.style.display = "inline-flex";

      cart.forEach((item, index) => {
        if (!item.qty) item.qty = 1;
        total += parseFloat(item.price) * item.qty;
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">
          <div class="cart-item-info">
            <h3>${item.name}</h3>
            <p class="item-price">R${(parseFloat(item.price) * item.qty).toFixed(2)}</p>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${index}, -1)">&#8722;</button>
              <span class="qty-number">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${index}, 1)">&#43;</button>
            </div>
          </div>
          <button class="remove-btn" onclick="removeItem(${index})">
            <i class="fa-solid fa-trash"></i>
          </button>`;
        cartItemsDiv.appendChild(div);
      });
      cartTotal.textContent = "R" + total.toFixed(2);
    }
  }

  function changeQty(index, change) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (!cart[index].qty) cart[index].qty = 1;
    cart[index].qty += change;
    if (cart[index].qty <= 0) {
      const name = cart[index].name;
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      showToast(name + " removed from cart 🗑️");
    } else {
      localStorage.setItem("cart", JSON.stringify(cart));
    }
    renderCart();
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const name = cart[index].name;
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    showToast(name + " removed from cart 🗑️");
    renderCart();
  }

  function clearCart() {
    localStorage.removeItem("cart");
    showToast("Cart cleared! 🗑️");
    renderCart();
  }

  document.getElementById("checkoutBtn").addEventListener("click", () => {
    window.location.href = "/payment";
  });

  renderCart();
</script>
</body>
</html>
